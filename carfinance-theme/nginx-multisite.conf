# CarFinance MSK — Nginx Multisite Configuration
# WordPress Multisite with subdomain support
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 80;
    server_name carfinance-msk.ru *.carfinance-msk.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name carfinance-msk.ru *.carfinance-msk.ru;

    root /var/www/carfinance-msk.ru/public_html;
    index index.php index.html;

    # SSL certificates (Let's Encrypt wildcard)
    ssl_certificate     /etc/letsencrypt/live/carfinance-msk.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carfinance-msk.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Browser caching
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WordPress Multisite subdomain rules
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ^/(wp-config\.php|readme\.html|license\.txt) {
        deny all;
    }

    # XML sitemap rewrite
    rewrite ^/sitemap\.xml$ /index.php?sitemap=1 last;
    rewrite ^/sitemap-([a-z]+)-?([0-9]+)?\.xml$ /index.php?sitemap=$1&sitemap_n=$2 last;

    # Max upload
    client_max_body_size 64M;

    # Logs
    access_log /var/log/nginx/carfinance-access.log;
    error_log  /var/log/nginx/carfinance-error.log;
}
